name: Fetch All Room Data

on:
  schedule:
    - cron: '0 * * * *'  # hourly
  workflow_dispatch:      # allow manual trigger

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch all room data
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: bash scripts/fetch_all.sh

      - name: Commit and push
        run: |
          git config user.name "Signal Rooms Bot"
          git config user.email "noreply@github.com"
          git add rooms/gold/data/ rooms/gpu/data/ rooms/oil-gas/data/ rooms/housing/data/ data/housing/
          git diff --staged --quiet || git commit -m "Update all room data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
