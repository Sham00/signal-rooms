<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#080808"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <linearGradient id="goldGlow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffd700" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Top gold accent bar -->
  <rect x="0" y="0" width="1200" height="5" fill="#ffd700"/>
  <!-- Subtle gold glow behind price -->
  <rect x="60" y="160" width="700" height="220" rx="16" fill="url(#goldGlow)"/>

  <!-- Header row -->
  <text x="80" y="80" font-family="Arial" font-size="14" font-weight="bold" fill="#444" letter-spacing="5" text-transform="uppercase">GOLD SITUATION ROOM</text>
  <text x="1120" y="80" font-family="Arial" font-size="12" fill="#333" text-anchor="end">sham00.github.io/gold-situation-room</text>

  <!-- Au atom symbol -->
  <circle cx="1100" cy="260" r="80" fill="none" stroke="#ffd700" stroke-width="1" stroke-opacity="0.1"/>
  <circle cx="1100" cy="260" r="50" fill="none" stroke="#ffd700" stroke-width="1" stroke-opacity="0.15"/>
  <text x="1100" y="253" font-family="Arial" font-size="22" font-weight="bold" fill="#333" text-anchor="middle">79</text>
  <text x="1100" y="278" font-family="Arial" font-size="38" font-weight="900" fill="#3a3a3a" text-anchor="middle">Au</text>

  <!-- Divider -->
  <line x1="80" y1="105" x2="1120" y2="105" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Price label -->
  <text x="80" y="175" font-family="Arial" font-size="16" fill="#555" letter-spacing="2">GOLD SPOT PRICE (USD/oz)</text>

  <!-- Main price -->
  <text x="80" y="295" font-family="Arial" font-size="108" font-weight="900" fill="#ffd700">$4,652</text>

  <!-- Change and YTD on same row -->
  <text x="84" y="350" font-family="Arial" font-size="40" fill="#ff4444">▼ 1.18%</text>
  <text x="84" y="410" font-family="Arial" font-size="28" fill="#00ff88">▲ 7.8% YTD</text>

  <!-- Divider before stats -->
  <line x1="80" y1="478" x2="1120" y2="478" stroke="#1a1a1a" stroke-width="1"/>

  <!-- Stat pills -->
  
  <rect x="80" y="500" width="200" height="60" rx="8" fill="rgba(255,255,255,0.05)" stroke="#ffd700" stroke-width="1" stroke-opacity="0.3"/>
  <text x="94" y="520" font-family="Arial" font-size="13" fill="#666">Au/Ag Ratio</text>
  <text x="94" y="544" font-family="Arial" font-size="18" font-weight="bold" fill="#ffd700">64.0x</text>
  <rect x="300" y="500" width="200" height="60" rx="8" fill="rgba(255,255,255,0.05)" stroke="#888" stroke-width="1" stroke-opacity="0.3"/>
  <text x="314" y="520" font-family="Arial" font-size="13" fill="#666">RSI(14)</text>
  <text x="314" y="544" font-family="Arial" font-size="18" font-weight="bold" fill="#888">37</text>
  <rect x="520" y="500" width="322" height="60" rx="8" fill="rgba(255,255,255,0.05)" stroke="#00ff88" stroke-width="1" stroke-opacity="0.3"/>
  <text x="534" y="520" font-family="Arial" font-size="13" fill="#666">Bank Consensus</text>
  <text x="534" y="544" font-family="Arial" font-size="18" font-weight="bold" fill="#00ff88">$5,400 (+16%)</text>
  <rect x="862" y="500" width="210" height="60" rx="8" fill="rgba(255,255,255,0.05)" stroke="#ff4444" stroke-width="1" stroke-opacity="0.3"/>
  <text x="876" y="520" font-family="Arial" font-size="13" fill="#666">Real Yield 10Y</text>
  <text x="876" y="544" font-family="Arial" font-size="18" font-weight="bold" fill="#ff4444">1.97%</text>
</svg>